<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Climate Visualizer</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #e0e0e0;
      padding: 0;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header-bar {
      background: #121212;
      border-bottom: 1px solid #333;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    #map {
      flex-grow: 1;
      background: #000;
    }

    select,
    button {
      background-color: #252525;
      color: #ffffff;
      border: 1px solid #444;
      padding: 5px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    .leaflet-popup-content-wrapper {
      background: #1a1a1a !important;
      color: #fff !important;
      border: 1px solid #444;
      border-radius: 8px !important;
    }

    .leaflet-popup-tip {
      background: #1a1a1a !important;
      border: 1px solid #444;
    }

    .leaflet-tile {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
  </style>
</head>

<body>
  <div class="header-bar">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 20px;">🌍</span>
      <h2 style="margin:0; font-size: 18px;">Climate Visualizer</h2>
      <span id="status" style="font-size: 11px; color:#555;">Ready</span>
      <a href="https://github.com/ioncook/climate-visualizer" target="_blank"
        style="font-size: 11px; color: #444; text-decoration: none; margin-left: 6px; border-left: 1px solid #333; padding-left: 6px;">View
        Source</a>
    </div>
    <div class="controls">
      <select id="era">
        <option value="1901_1930">1901-1930 Era</option>
        <option value="1931_1960">1931-1960 Era</option>
        <option value="1961_1990">1961-1990 Era</option>
        <option value="1991_2020" selected>1991-2020 Era</option>
      </select>
      <select id="basemap">
        <option value="dark">Dark Matter</option>
        <option value="topo">Topography</option>
        <option value="physical">Physical Map</option>
        <option value="light">Clean Light Map</option>
        <option value="osm">Open Street Map</option>
        <option value="satellite">Satellite</option>
      </select>
      <select id="units">
        <option value="metric">Metric (°C/mm)</option>
        <option value="imperial" selected>Imperial (°F/in)</option>
      </select>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const COLORS = {
      1: "rgb(0, 0, 255)", 2: "rgb(0, 120, 255)", 3: "rgb(70, 170, 250)", 4: "rgb(255, 0, 0)",
      5: "rgb(255, 150, 150)", 6: "rgb(245, 165, 0)", 7: "rgb(255, 220, 100)", 8: "rgb(255, 255, 0)",
      9: "rgb(200, 200, 0)", 10: "rgb(150, 150, 0)", 11: "rgb(150, 255, 150)", 12: "rgb(100, 200, 100)",
      13: "rgb(50, 150, 50)", 14: "rgb(200, 255, 80)", 15: "rgb(100, 255, 80)", 16: "rgb(50, 200, 0)",
      17: "rgb(255, 0, 255)", 18: "rgb(200, 0, 200)", 19: "rgb(150, 50, 150)", 20: "rgb(150, 100, 150)",
      21: "rgb(170, 175, 255)", 22: "rgb(90, 120, 220)", 23: "rgb(75, 80, 180)", 24: "rgb(50, 0, 135)",
      25: "rgb(0, 255, 255)", 26: "rgb(55, 200, 255)", 27: "rgb(0, 125, 125)", 28: "rgb(0, 70, 95)",
      29: "rgb(178, 178, 178)", 30: "rgb(102, 102, 102)"
    };

    const LEGENDS = {
      1: ["Af", "Tropical rainforest"], 2: ["Am", "Tropical monsoon"], 3: ["Aw", "Tropical savannah"],
      4: ["BWh", "Arid desert, hot"], 5: ["BWk", "Arid desert, cold"], 6: ["BSh", "Arid steppe, hot"], 7: ["BSk", "Arid steppe, cold"],
      8: ["Csa", "Temperate, dry summer, hot summer"], 9: ["Csb", "Temperate, dry summer, warm summer"], 10: ["Csc", "Temperate, dry summer, cold summer"],
      11: ["Cwa", "Temperate, dry winter, hot summer"], 12: ["Cwb", "Temperate, dry winter, warm summer"], 13: ["Cwc", "Temperate, dry winter, cold summer"],
      14: ["Cfa", "Temperate, no dry season, hot summer"], 15: ["Cfb", "Temperate, no dry season, warm summer"], 16: ["Cfc", "Temperate, no dry season, cold summer"],
      17: ["Dsa", "Cold, dry summer, hot summer"], 18: ["Dsb", "Cold, dry summer, warm summer"], 19: ["Dsc", "Cold, dry summer, cold summer"], 20: ["Dsd", "Cold, dry summer, very cold winter"],
      21: ["Dwa", "Cold, dry winter, hot summer"], 22: ["Dwb", "Cold, dry winter, warm summer"], 23: ["Dwc", "Cold, dry winter, cold summer"], 24: ["Dwd", "Cold, dry winter, very cold winter"],
      25: ["Dfa", "Cold, no dry season, hot summer"], 26: ["Dfb", "Cold, no dry season, warm summer"], 27: ["Dfc", "Cold, no dry season, cold summer"], 28: ["Dfd", "Cold, no dry season, very cold winter"],
      29: ["ET", "Polar tundra"], 30: ["EF", "Polar frost"]
    };

    const map = L.map('map', { center: [20, 0], zoom: 3, zoomSnap: 0, wheelPxPerZoomLevel: 50, zoomControl: false });

    // BASEMAP LAYERS
    const BASEMAPS = {
      dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', { subdomains: 'abcd' }),
      topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'),
      physical: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}'),
      light: L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', { subdomains: 'abcd' }),
      osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
      satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
    };

    let currentBasemapLayer = BASEMAPS.dark.addTo(map);

    const basemapSelect = document.getElementById('basemap');
    basemapSelect.addEventListener('change', (e) => {
      map.removeLayer(currentBasemapLayer);
      currentBasemapLayer = BASEMAPS[e.target.value];
      currentBasemapLayer.addTo(map);

      // Update opacity for better visibility on lighter/complex basemaps
      const hiOpacity = ['topo', 'physical', 'light', 'osm', 'satellite'].includes(e.target.value);
      const opacity = hiOpacity ? 0.9 : 0.7;
      koppenLayer.setOpacity(opacity);
      precipLayer.setOpacity(opacity);
      tempLayer.setOpacity(opacity);

      // Ensure climate layers stay on top
      koppenLayer.bringToFront();
      precipLayer.bringToFront();
      tempLayer.bringToFront();
    });

    // STATIC PRE-GENERATED CHUNKS (Relative to selected Era)
    let currentEra = "1991_2020";

    let currentMonth = "12"; // Default to annual
    let currentLayerType = 'koppen';

    // Placeholder layers
    let koppenLayer = L.tileLayer("");
    let precipLayer = L.tileLayer("");
    let tempLayer = L.tileLayer("");

    function updateLayers() {
      const era = currentEra;
      const lType = currentLayerType;
      const m = currentMonth;

      map.removeLayer(koppenLayer);
      map.removeLayer(precipLayer);
      map.removeLayer(tempLayer);

      // Re-create layers for the correct Era to ensure full refresh
      koppenLayer = L.tileLayer(`${era}/tiles_koppen/{z}/{x}/{y}.png`, {
        maxNativeZoom: 6, maxZoom: 14, opacity: 0.7, tms: false
      });
      precipLayer = L.tileLayer(`${era}/tiles_precip/${m}/{z}/{x}/{y}.png`, {
        maxNativeZoom: 6, maxZoom: 14, opacity: 0.7, tms: false
      });
      tempLayer = L.tileLayer(`${era}/tiles_temp/${m}/{z}/{x}/{y}.png`, {
        maxNativeZoom: 6, maxZoom: 14, opacity: 0.7, tms: false
      });

      // Maintain opacity logic
      const basemap = document.getElementById('basemap').value;
      const hiOpacity = ['topo', 'physical', 'light', 'osm', 'satellite'].includes(basemap);
      const op = hiOpacity ? 0.9 : 0.7;
      koppenLayer.setOpacity(op);
      precipLayer.setOpacity(op);
      tempLayer.setOpacity(op);

      if (lType === 'none') {
        document.getElementById('status').innerText = "Overlays Disabled";
      } else if (lType === 'koppen') {
        map.addLayer(koppenLayer);
        document.getElementById('status').innerText = `Köppen DB Active [${era}]`;
      } else if (lType === 'precip') {
        map.addLayer(precipLayer);
        const monthText = m === "12" ? "Annual" : ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][m];
        document.getElementById('status').innerText = `Precipitation Active (${monthText}) [${era}]`;
      } else if (lType === 'temp') {
        map.addLayer(tempLayer);
        const monthText = m === "12" ? "Annual" : ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][m];
        document.getElementById('status').innerText = `Temperature Active (${monthText}) [${era}]`;
      }
    }

    // Initial load
    updateLayers();

    const eraSelect = document.getElementById('era');
    eraSelect.addEventListener('change', (e) => {
      currentEra = e.target.value;
      updateLayers();
      if (lastLatLng) queryLocation(lastLatLng.lat, lastLatLng.lng);
    });

    // Global helper for interactive tooltip
    window.setLayer = (type, month) => {
      const isSameType = (type === currentLayerType);
      const isSameMonth = (month === undefined || String(month) === currentMonth);

      if (isSameType && isSameMonth) {
        currentLayerType = 'none';
      } else {
        if (type) currentLayerType = type;
        if (month !== undefined) currentMonth = String(month);
      }
      updateLayers();
    };

    // No dropdown for month or layer type selection anymore.
    // Selection is handled via the tooltip interactions.

    // Scroll-to-change selection helper
    function makeSelectScrollable(selectEl) {
      selectEl.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 1 : -1;
        let newIndex = selectEl.selectedIndex + delta;
        if (newIndex >= 0 && newIndex < selectEl.options.length) {
          selectEl.selectedIndex = newIndex;
          selectEl.dispatchEvent(new Event('change'));
        }
      }, { passive: false });
    }

    makeSelectScrollable(document.getElementById('units'));

    // FETCH STATIC JSON DATABASE (Now Tiled/On-Demand)
    const queryCache = {};

    document.getElementById('status').innerText = "Click map to load high-res climate data";

    // Helper for Rainbow Color Coding via HSL
    function getTempColor(t) {
      let clamped = Math.max(-30, Math.min(30, t));
      let hue = 270 * (1 - (clamped + 30) / 60);
      return `hsl(${hue}, 100%, 65%)`;
    }

    function getPrecipColor(p) {
      let clamped = Math.max(0, Math.min(500, p));
      let curve = Math.pow(clamped / 500, 0.7);
      let hue = 270 * curve;
      return `hsl(${hue}, 100%, 65%)`;
    }

    let lastQueryData = null;
    let lastLatLng = null;

    function updatePopup() {
      if (!lastQueryData || !lastLatLng) return;
      const d = lastQueryData;
      const latlng = lastLatLng;

      const badgeColor = COLORS[d.i] || "rgb(68, 68, 68)";
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const info = LEGENDS[d.i] || ["Unk", "Unknown"];

      const unitType = document.getElementById('units').value;
      const isMetric = unitType === 'metric';

      const totalPrecip = d.p.reduce((acc, curr) => acc + curr, 0);
      const avgTemp = d.t.reduce((acc, curr) => acc + curr, 0) / d.t.length;

      const html = `
        <div style="min-width: 320px;">
          <div style="font-weight:700; color:#eee; border-bottom:1px solid #444; padding-bottom:5px; margin-bottom:8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; hover: opacity: 0.8;" onclick="setLayer('koppen')">
            <div style="display: flex; align-items: center;">
              <span style="background:${badgeColor}; color:#000; text-shadow: 0px 0px 2px rgba(255,255,255,0.5); padding:2px 6px; border-radius:3px; margin-right:8px;">${info[0]}</span>
              ${info[1]}
            </div>
          </div>
          
          <table style="width:100%; font-size:11px; border-collapse:collapse; text-align:center; font-family: inherit;">
            <tr style="color:#aaa; border-bottom:1px solid #333;">
              <td style="text-align:left; font-weight:bold; padding:2px 0;"></td>
              ${months.map(m => `<td style="padding: 0 2px;">${m}</td>`).join('')}
              <td style="border-left: 1px solid #444; font-weight: bold; padding-left: 4px;">Year</td>
            </tr>
            <tr style="cursor: pointer;">
              <td style="text-align:left; color:#aaa; font-weight:bold; padding:2px 0; white-space: nowrap;" onclick="setLayer('temp', 12)">T°(${isMetric ? 'C' : 'F'})</td>
              ${d.t.map((t, idx) => {
        const val = isMetric ? Math.round(t) : Math.round(t * 9 / 5 + 32);
        return `<td style="color:${getTempColor(t)}; font-weight:bold;" onclick="setLayer('temp', ${idx})">${val}</td>`;
      }).join('')}
              <td style="border-left: 1px solid #444; font-weight: bold; padding-left: 4px; color:${getTempColor(avgTemp)};" onclick="setLayer('temp', 12)">${isMetric ? Math.round(avgTemp) : Math.round(avgTemp * 9 / 5 + 32)}</td>
            </tr>
            <tr style="cursor: pointer;">
              <td style="text-align:left; color:#aaa; font-weight:bold; padding:2px 0; white-space: nowrap;" onclick="setLayer('precip', 12)">P(${isMetric ? 'mm' : 'in'})</td>
              ${d.p.map((p, idx) => {
        const val = isMetric ? Math.round(p) : (p / 25.4).toFixed(1);
        return `<td style="color:${getPrecipColor(p / 2.5)}; font-weight:bold;" onclick="setLayer('precip', ${idx})">${val}</td>`;
      }).join('')}
              <td style="border-left: 1px solid #444; font-weight: bold; padding-left: 4px; color:${getPrecipColor(totalPrecip / 12)};" onclick="setLayer('precip', 12)">${isMetric ? Math.round(totalPrecip) : (totalPrecip / 25.4).toFixed(1)}</td>
            </tr>
          </table>
        </div>
      `;
      L.popup({ maxWidth: 450 }).setLatLng(latlng).setContent(html).openOn(map);
    }

    const unitsSelect = document.getElementById('units');
    unitsSelect.addEventListener('change', updatePopup);

    makeSelectScrollable(eraSelect);
    makeSelectScrollable(basemapSelect);
    makeSelectScrollable(unitsSelect);

    // OFFLINE CLICK QUERY
    async function queryLocation(lat, lng) {
      if (!lat || !lng) return;
      
      // Compute 10x10 degree grid id
      const latChunk = Math.floor(lat / 10) * 10;
      const lonChunk = Math.floor(lng / 10) * 10;
      const chunkKey = `${currentEra}_${latChunk}_${lonChunk}`;

      if (!queryCache[chunkKey]) {
        document.getElementById('status').innerText = `Loading Region [${chunkKey}]...`;
        try {
          const res = await fetch(`${currentEra}/query_tiles/${latChunk}_${lonChunk}.json`);
          if (!res.ok) throw new Error();
          queryCache[chunkKey] = await res.json();
          document.getElementById('status').innerText = "Regional Dataset Ready";
        } catch (err) {
          document.getElementById('status').innerText = "Ocean (No Data)";
          return;
        }
      }

      const db = queryCache[chunkKey];

      // Map lat/long to 0.1 degree exact ensemble grid (3600x1800)
      const y = Math.max(0, Math.min(1799, Math.floor((90 - lat) / 180 * 1800)));
      let x = Math.floor((lng + 180) / 360 * 3600) % 3600;
      x = x < 0 ? x + 3600 : x;

      const d = db[`${y}_${x}`];
      if (!d) return;

      lastQueryData = d;
      lastLatLng = { lat, lng };
      updatePopup();
    }

    map.on('click', (e) => queryLocation(e.latlng.lat, e.latlng.lng));
  </script>
</body>

</html>

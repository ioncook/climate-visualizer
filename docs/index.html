<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Climate Visualizer</title>
  <link rel="icon" href="favicon.png" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.css" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #000000;
      color: #e0e0e0;
      padding: 0;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header-bar {
      background: #121212;
      border-bottom: 1px solid #333;
      padding: 10px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    #map {
      flex-grow: 1;
      background: #000;
    }

    select,
    button {
      background-color: #252525;
      color: #ffffff;
      border: 1px solid #444;
      padding: 5px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    .settings-dropdown {
      position: relative;
      display: inline-block;
    }

    .settings-content {
      display: none;
      position: absolute;
      right: 2px;
      top: 45px;
      background-color: #1a1a1a;
      min-width: 200px;
      box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.5);
      z-index: 1001;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 12px;
    }

    .settings-content.show {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .legend-container {
      position: absolute;
      bottom: 25px;
      left: 20px;
      z-index: 1000;
      color: white;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      pointer-events: none;
    }

    #layer-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .legend-bar {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .gradient-bar {
      height: 6px;
      width: 250px;
      border-radius: 3px;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      width: 250px;
      font-size: 10px;
      font-weight: 600;
      color: #ccc;
    }

    .maplibregl-popup-content {
      background: #1a1a1a !important;
      color: #fff !important;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
      border-radius: 8px !important;
      padding: 10px !important;
    }

    .maplibregl-popup-anchor-top .maplibregl-popup-tip {
      border-bottom-color: #1a1a1a !important;
    }

    .maplibregl-popup-anchor-bottom .maplibregl-popup-tip {
      border-top-color: #1a1a1a !important;
    }

    .maplibregl-popup-anchor-left .maplibregl-popup-tip {
      border-right-color: #1a1a1a !important;
    }

    .maplibregl-popup-anchor-right .maplibregl-popup-tip {
      border-left-color: #1a1a1a !important;
    }

    .maplibregl-popup-anchor-top-left .maplibregl-popup-tip {
       border-bottom-color: #1a1a1a !important;
    }
    .maplibregl-popup-anchor-top-right .maplibregl-popup-tip {
       border-bottom-color: #1a1a1a !important;
    }
    .maplibregl-popup-anchor-bottom-left .maplibregl-popup-tip {
       border-top-color: #1a1a1a !important;
    }
    .maplibregl-popup-anchor-bottom-right .maplibregl-popup-tip {
       border-top-color: #1a1a1a !important;
    }

    .maplibregl-popup-close-button {
      color: #888 !important;
      font-size: 16px !important;
      right: 2px !important;
      top: 0px !important;
      padding: 0 5px !important;
      border: none !important;
      background: transparent !important;
      outline: none !important;
    }

    .maplibregl-popup-close-button:hover {
      color: #fff !important;
      background: transparent !important;
    }

    .maplibregl-ctrl-attrib {
      background: rgba(0, 0, 0, 0.5) !important;
      color: #aaa !important;
    }

    .maplibregl-ctrl-attrib a {
      color: #888 !important;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      font-size: 11px;
      color: #aaa;
    }

    .setting-row select,
    .setting-row input {
      background: #333;
      color: #fff;
      border: 1px solid #444;
      border-radius: 3px;
      padding: 2px 5px;
      outline: none;
    }

    /* Theme-fitting range slider */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      padding: 0;
      border: none;
    }

    input[type=range]::-webkit-slider-runnable-track {
      height: 4px;
      background: #444;
      border-radius: 2px;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 12px;
      width: 12px;
      border-radius: 50%;
      background: #aaa;
      cursor: pointer;
      margin-top: -4px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
    }

    input[type=range]:hover::-webkit-slider-thumb {
      background: #fff;
    }

    .leaflet-tile {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
    }
  </style>
</head>

<body>
  <div class="header-bar">
    <div style="display: flex; align-items: center; gap: 8px;">
      <img src="logo.png" alt="Logo" style="height: 24px; border-radius: 4px;">
      <h2 style="margin:0; font-size: 18px; white-space: nowrap;">Climate Visualizer</h2>
      <div style="display: flex; flex-direction: column; gap: 1px; margin-left: 8px; line-height: 1.1;">
        <span id="status" style="font-size: 11px; color:#555;">Ready</span>
        <a href="https://github.com/ioncook/climate-visualizer" target="_blank"
          style="font-size: 10px; color: #444; text-decoration: none;">View Source</a>
      </div>
    </div>
    <div class="controls">
      <select id="era">
        <option value="1901_1930">1901-1930 Averages</option>
        <option value="1931_1960">1931-1960 Averages</option>
        <option value="1961_1990">1961-1990 Averages</option>
        <option value="1991_2020" selected>1991-2020 Averages</option>
      </select>
      <select id="compare" title="Only applies to Annual data">
        <option value="none" selected>Compare to...</option>
        <option value="1901_1930">1901-1930 Averages</option>
        <option value="1931_1960">1931-1960 Averages</option>
        <option value="1961_1990">1961-1990 Averages</option>
        <option value="1991_2020">1991-2020 Averages</option>
      </select>
      <div class="settings-dropdown">
        <button id="settings-btn"
          style="background:none; border:none; display:flex; align-items:center; padding: 0 10px; cursor:pointer;"
          onclick="toggleSettings(event)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
        <div id="settings-menu" class="settings-content">
          <label style="font-size: 11px; color:#aaa; margin-bottom: 4px;">Basemap</label>
          <select id="basemap" style="width:100%;">
            <option value="dark">Dark Matter</option>
            <option value="topo">Topography</option>
            <option value="physical">Physical Map</option>
            <option value="light">Clean Light Map</option>
            <option value="osm">Open Street Map</option>
            <option value="satellite">Satellite</option>
            <option value="none">None (Plain Black)</option>
          </select>
          <hr style="border:0; border-top: 1px solid #333; margin: 8px 0;">
          <div class="setting-row">
            <span>Units</span>
            <select id="units">
              <option value="imperial">Imperial (°F, in)</option>
              <option value="metric">Metric (°C, mm)</option>
            </select>
          </div>
          <div class="setting-row">
            <span>Projection</span>
            <select id="projection">
              <option value="globe">3D Globe</option>
              <option value="mercator">Flat (2D)</option>
            </select>
          </div>
          <div class="setting-row" id="opacity-row">
            <span>Layer Opacity</span>
            <input type="range" id="layer-opacity" min="0" max="100" value="75" style="width: 100px;">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="map">
    <div class="legend-container">
      <div id="layer-title">Köppen Classification</div>
      <div id="legend-content" class="legend-bar">
        <!-- Dynamic Legend Injection -->
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@^5.0.0/dist/maplibre-gl.js"></script>

  <script>
    const COLORS = {
      1: "rgb(0, 0, 255)", 2: "rgb(0, 120, 255)", 3: "rgb(70, 170, 250)", 4: "rgb(255, 0, 0)",
      5: "rgb(255, 150, 150)", 6: "rgb(245, 165, 0)", 7: "rgb(255, 220, 100)", 8: "rgb(255, 255, 0)",
      9: "rgb(200, 200, 0)", 10: "rgb(150, 150, 0)", 11: "rgb(150, 255, 150)", 12: "rgb(100, 200, 100)",
      13: "rgb(50, 150, 50)", 14: "rgb(200, 255, 80)", 15: "rgb(100, 255, 80)", 16: "rgb(50, 200, 0)",
      17: "rgb(255, 0, 255)", 18: "rgb(200, 0, 200)", 19: "rgb(150, 50, 150)", 20: "rgb(150, 100, 150)",
      21: "rgb(170, 175, 255)", 22: "rgb(90, 120, 220)", 23: "rgb(75, 80, 180)", 24: "rgb(50, 0, 135)",
      25: "rgb(0, 255, 255)", 26: "rgb(55, 200, 255)", 27: "rgb(0, 125, 125)", 28: "rgb(0, 70, 95)",
      29: "rgb(178, 178, 178)", 30: "rgb(102, 102, 102)"
    };

    const LEGENDS = {
      1: ["Af", "Tropical rainforest"], 2: ["Am", "Tropical monsoon"], 3: ["Aw", "Tropical savanna"],
      4: ["BWh", "Arid desert, hot"], 5: ["BWk", "Arid desert, cold"], 6: ["BSh", "Semi-arid, hot"], 7: ["BSk", "Semi-arid, cold"],
      8: ["Csa", "Temperate, dry summer, hot summer"], 9: ["Csb", "Temperate, dry summer, warm summer"], 10: ["Csc", "Temperate, dry summer, cold summer"],
      11: ["Cwa", "Temperate, dry winter, hot summer"], 12: ["Cwb", "Temperate, dry winter, warm summer"], 13: ["Cwc", "Temperate, dry winter, cold summer"],
      14: ["Cfa", "Temperate, no dry season, hot summer"], 15: ["Cfb", "Temperate, no dry season, warm summer"], 16: ["Cfc", "Temperate, no dry season, cold summer"],
      17: ["Dsa", "Cold, dry summer, hot summer"], 18: ["Dsb", "Cold, dry summer, warm summer"], 19: ["Dsc", "Cold, dry summer, cold summer"], 20: ["Dsd", "Cold, dry summer, very cold winter"],
      21: ["Dwa", "Cold, dry winter, hot summer"], 22: ["Dwb", "Cold, dry winter, warm summer"], 23: ["Dwc", "Cold, dry winter, cold summer"], 24: ["Dwd", "Cold, dry winter, very cold winter"],
      25: ["Dfa", "Cold, no dry season, hot summer"], 26: ["Dfb", "Cold, no dry season, warm summer"], 27: ["Dfc", "Cold, no dry season, cold summer"], 28: ["Dfd", "Cold, no dry season, very cold winter"],
      29: ["ET", "Polar tundra / Highland"], 30: ["EF", "Polar frost / Ice cap"]
    };

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        sources: {},
        layers: []
      },
      center: [0, 20],
      zoom: 1.5,
      projection: 'globe',
      attributionControl: true
    });

    // BASEMAP SOURCES
    const BASEMAPS = {
      dark: { url: 'https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>' },
      topo: { url: 'https://a.tile.opentopomap.org/{z}/{x}/{y}.png', attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors, SRTM' },
      physical: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}', attribution: '&copy; Esri, Earthstar Geographics, Garmin, FAO, METI/NASA, USGS' },
      light: { url: 'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>' },
      osm: { url: 'https://tile.openstreetmap.org/{z}/{x}/{y}.png', attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' },
      satellite: { url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', attribution: '&copy; Esri, Earthstar Geographics' }
    };

    const basemapSelect = document.getElementById('basemap');
    const unitsSelect = document.getElementById('units');
    const opacitySlider = document.getElementById('layer-opacity');
    const eraSelect = document.getElementById('era');
    const compareSelect = document.getElementById('compare');
    const projectionSelect = document.getElementById('projection');

    // Single source of truth: dropdown values.
    // We will initialize them from localStorage if available in loadStoredSettings()

    let currentBasemapId = 'dark';

    function setupBasemap(id) {
      if (id === 'none') {
        if (map.getLayer('basemap-layer')) map.setLayoutProperty('basemap-layer', 'visibility', 'none');
        return;
      }

      const { url, attribution } = BASEMAPS[id];
      if (map.getLayer('basemap-layer')) map.removeLayer('basemap-layer');
      if (map.getSource('basemap-source')) map.removeSource('basemap-source');

      map.addSource('basemap-source', {
        type: 'raster',
        tiles: [url],
        tileSize: 256,
        attribution: attribution
      });

      map.addLayer({
        id: 'basemap-layer',
        type: 'raster',
        source: 'basemap-source'
      }, map.getLayer('data-layer') ? 'data-layer' : undefined);
    }

    basemapSelect.addEventListener('change', (e) => {
      currentBasemapId = basemapSelect.value;
      localStorage.setItem('climate_basemap', currentBasemapId);
      setupBasemap(currentBasemapId);
    });

    projectionSelect.addEventListener('change', () => {
      const proj = projectionSelect.value;
      localStorage.setItem('climate_projection', proj);
      if (proj === 'globe') {
        map.setProjection({ type: 'globe' });
        map.dragRotate.enable();
      } else {
        map.setProjection({ type: 'mercator' });
        map.setPitch(0);
        map.dragRotate.disable();
      }
      updateLayers();
    });

    map.on('load', () => {
      loadStoredSettings();

      const era = eraSelect.value;
      const comp = compareSelect.value;
      const isComp = comp !== 'none' && era !== comp && (currentMonth === "12" || currentLayerType === 'koppen');

      const erasValues = ["1901_1930", "1931_1960", "1961_1990", "1991_2020"];
      let era1 = era;
      let era2 = comp;
      if (isComp && erasValues.indexOf(era1) > erasValues.indexOf(era2)) [era1, era2] = [era2, era1];

      const tilePrefix = isComp ? `compare/${era1}_${era2}` : era;
      const baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
      const initialTileUrl = baseUrl + `${tilePrefix}/tiles_koppen/{z}/{x}/{y}.png?v=2`;

      if (!map.getSource('data-source')) {
        map.addSource('data-source', {
          type: 'raster',
          tiles: [initialTileUrl],
          tileSize: 256,
          maxzoom: 7
        });
      }

      if (!map.getLayer('data-layer')) {
        map.addLayer({
          id: 'data-layer',
          type: 'raster',
          source: 'data-source',
          paint: { 'raster-opacity': 0.75, 'raster-resampling': 'nearest' }
        });
      }

      const proj = projectionSelect.value;
      if (proj === 'globe') {
        map.setProjection({ type: 'globe' });
        map.dragRotate.enable();
      } else {
        map.setProjection({ type: 'mercator' });
        map.setPitch(0);
        map.dragRotate.disable();
      }

      updateLayers();
    });

    // STATIC PRE-GENERATED CHUNKS (Relative to selected Era)
    let currentMonth = "12"; // Default to annual
    let currentLayerType = 'koppen';

    // Layer state is managed via MapLibre sources/layers directly in updateLayers()

    function isCompareMode() {
      const era = eraSelect.value;
      const comp = compareSelect.value;
      // MUST show comparison ONLY if two different eras are chosen AND we are in an annual or Kopper layer
      const supported = currentMonth == "12" || currentLayerType === 'koppen';
      return comp !== 'none' && comp !== era && supported;
    }

    function updateLayers() {
      // Don't return if !map.loaded(); we want the latest setting to be queued/applied as soon as possible.
      // maplibregl's API will handle most calls even before 'load' as long as the source exists.

      const era = eraSelect.value;
      const comp = compareSelect.value;
      const eras = ["1901_1930", "1931_1960", "1961_1990", "1991_2020"];

      const isCompare = isCompareMode();

      let era1 = era;
      let era2 = comp;
      // For comparisons, we always sort era1 < era2 (earlier vs later)
      if (isCompare && eras.indexOf(era1) > eras.indexOf(era2)) {
        [era1, era2] = [era2, era1];
      }

      const lType = currentLayerType;
      const m = currentMonth;
      const tilePrefix = isCompare ? `compare/${era1}_${era2}` : era;

      // Base path for tiles
      let tilePath = "";
      if (lType === 'koppen') {
        tilePath = `${tilePrefix}/tiles_koppen/{z}/{x}/{y}.png?v=2`;
      } else if (lType === 'precip') {
        tilePath = `${tilePrefix}/tiles_precip/${m}/{z}/{x}/{y}.png?v=2`;
      } else if (lType === 'temp') {
        tilePath = `${tilePrefix}/tiles_temp/${m}/{z}/{x}/{y}.png?v=2`;
      } else if (lType === 'precip_max') {
        tilePath = `1991_2020/tiles_precip_max/{z}/{x}/{y}.png?v=2`;
      } else if (lType === 'precip_min') {
        tilePath = `1991_2020/tiles_precip_min/{z}/{x}/{y}.png?v=2`;
      }

      const op = opacitySlider.value / 100;

      // IMMEDIATE UI UPDATE
      const mText = m == "12" ? "Annual" : ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'][m];
      const statusEl = document.getElementById('status');

      if (lType === 'none') {
        statusEl.innerText = "Click map for data";
        updateLegend('none');
      } else if (lType === 'koppen') {
        statusEl.innerText = isCompare ? `Köppen Change [${era1.replace("_", "-")} vs ${era2.replace("_", "-")}]` : `Köppen DB Active [${era.replace("_", "-")}]`;
        updateLegend('koppen', isCompare);
      } else if (lType === 'precip') {
        statusEl.innerText = isCompare ? `Precipitation Change [${era1.replace("_", "-")} vs ${era2.replace("_", "-")}]` : `Precipitation Active (${mText}) [${era.replace("_", "-")}]`;
        updateLegend('precip', isCompare);
      } else if (lType === 'temp') {
        statusEl.innerText = isCompare ? `Temperature Change [${era1.replace("_", "-")} vs ${era2.replace("_", "-")}]` : `Temperature Active (${mText}) [${era.replace("_", "-")}]`;
        updateLegend('temp', isCompare);
      } else if (lType === 'precip_max') {
        statusEl.innerText = "Month of Greatest Precipitation [1991-2020]";
        updateLegend('precip_max');
      } else if (lType === 'precip_min') {
        statusEl.innerText = "Month of Least Precipitation [1991-2020]";
        updateLegend('precip_min');
      }

      // SYNC MAP UPDATE
      const source = map.getSource('data-source');
      if (source && tilePath) {
        const baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
        const absoluteTileUrl = baseUrl + tilePath;

        source.setTiles([absoluteTileUrl]);
        map.setLayoutProperty('data-layer', 'visibility', 'visible');
        map.setPaintProperty('data-layer', 'raster-opacity', op);
      } else if (source) {
        map.setLayoutProperty('data-layer', 'visibility', 'none');
      }
    }

    function updateLegend(type, isCompare) {
      const titleEl = document.getElementById('layer-title');
      const contentEl = document.getElementById('legend-content');
      const isMetric = unitsSelect.value === 'metric';
      const mText = currentMonth === "12" ? "Annual" : ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'][currentMonth];

      if (type === 'none') {
        titleEl.innerText = "";
        contentEl.innerHTML = "";
        return;
      }

      if (type === 'koppen') {
        titleEl.innerText = isCompare ? "Köppen Category Shift" : "Köppen-Geiger Class";
        if (isCompare) {
          contentEl.innerHTML = `
            <div class="gradient-bar" style="background: linear-gradient(to right, #8000ff, #0000ff, #00ffff, #00ff00, #ffff00, #ff8000, #ff0000);"></div>
            <div class="legend-labels"><span>Cooler Shift</span><span>Same</span><span>Warmer Shift</span></div>
          `;
        } else {
          contentEl.innerHTML = `<div style="font-size:10px; color:#888;">Color indicates climate zone classification</div>`;
        }
      } else if (type === 'temp') {
        titleEl.innerText = isCompare ? "Temperature Change" : `${mText} Average Temperature`;
        if (isCompare) {
          const t1 = isMetric ? "-0.8°C" : "-1.5°F";
          const t2 = isMetric ? "+1.7°C" : "+3°F";
          contentEl.innerHTML = `
            <div class="gradient-bar" style="background: linear-gradient(to right, #0000ff, #00ff00, #ff0000);"></div>
            <div class="legend-labels"><span>${t1}</span><span>0°</span><span>${t2}</span></div>
          `;
        } else {
          const tMin = isMetric ? "-30°C" : "-22°F";
          const tMax = isMetric ? "30°C" : "86°F";
          contentEl.innerHTML = `
            <div class="gradient-bar" style="background: linear-gradient(to right, #0000ff, #00ff00, #ff0000);"></div>
            <div class="legend-labels"><span>${tMin}</span><span>0°</span><span>${tMax}</span></div>
          `;
        }
      } else if (type === 'precip') {
        titleEl.innerText = isCompare ? "Precipitation Change" : `${mText} Average Precipitation`;
        if (isCompare) {
          contentEl.innerHTML = `
            <div class="gradient-bar" style="background: linear-gradient(to right, #ff0000, #00ff00, #0000ff);"></div>
            <div class="legend-labels"><span>Drier</span><span>Stable</span><span>Wetter</span></div>
          `;
        } else {
          const isAnnual = currentMonth === "12";
          const pMid = isMetric ? (isAnnual ? "1620mm" : "135mm") : (isAnnual ? "64in" : "5.3in");
          const pMax = isMetric ? (isAnnual ? "6000mm" : "500mm") : (isAnnual ? "240in" : "20in");
          contentEl.innerHTML = `
            <div class="gradient-bar" style="background: linear-gradient(to right, #ff0000 0%, #ffff00 10%, #00ff00 27%, #00ffff 48%, #0000ff 73%, #ff00ff 100%);"></div>
            <div class="legend-labels"><span>0</span><span>${pMid}</span><span>${pMax}</span></div>
          `;
        }
      } else if (type === 'precip_max' || type === 'precip_min') {
        titleEl.innerText = type === 'precip_max' ? "Wettest Month" : "Driest Month";
        contentEl.innerHTML = `
          <div class="gradient-bar" style="background: linear-gradient(to right, #ff00ff, #0000ff, #00ff00, #ffff00, #ff0000);"></div>
          <div class="legend-labels"><span>Jan</span><span>Jul</span><span>Dec</span></div>
        `;
      }
    }

    // Initial load
    updateLayers();

    let isPopupOpen = false;
    map.on('popupopen', () => { isPopupOpen = true; });
    map.on('popupclose', () => { isPopupOpen = false; });

    function maybeRefresh() {
      if (window.currentPopup && window.currentPopup.isOpen() && lastLatLng) {
        queryLocation(lastLatLng.lat, lastLatLng.lng, true);
      }
    }

    unitsSelect.addEventListener('change', () => {
      localStorage.setItem('climate_units', unitsSelect.value);
      updateLayers();
      if (window.currentPopup && window.currentPopup.isOpen()) {
        updatePopup();
      }
      updateLegend(currentLayerType, isCompareMode());
    });

    opacitySlider.addEventListener('input', () => {
      const op = opacitySlider.value / 100;
      localStorage.setItem('climate_opacity', opacitySlider.value);
      if (map.getLayer('data-layer')) {
        map.setPaintProperty('data-layer', 'raster-opacity', op);
      }
    });

    document.getElementById('opacity-row').addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -5 : 5;
      opacitySlider.value = Math.min(100, Math.max(0, parseInt(opacitySlider.value) + delta));
      opacitySlider.dispatchEvent(new Event('input'));
    });

    eraSelect.addEventListener('change', () => {
      updateLayers();
      maybeRefresh();
    });

    compareSelect.addEventListener('change', () => {
      updateLayers();
      maybeRefresh();
    });

    window.toggleSettings = (e) => {
      e.stopPropagation();
      document.getElementById('settings-menu').classList.toggle('show');
    };

    window.addEventListener('click', () => {
      document.getElementById('settings-menu').classList.remove('show');
    });

    document.getElementById('settings-menu').addEventListener('click', (e) => {
      e.stopPropagation();
    });

    unitsSelect.addEventListener('change', () => {
      if (isPopupOpen) updatePopup();
      updateLayers(); // Updates legend content
    });

    // LOAD SAVED SETTINGS
    function loadStoredSettings() {
      const storedBasemap = localStorage.getItem('climate_basemap');
      const storedUnits = localStorage.getItem('climate_units');
      const storedOpacity = localStorage.getItem('climate_opacity');
      const storedProjection = localStorage.getItem('climate_projection');

      if (storedBasemap) {
        basemapSelect.value = storedBasemap;
        currentBasemapId = storedBasemap;
      }
      setupBasemap(currentBasemapId);

      if (storedUnits) {
        unitsSelect.value = storedUnits;
      }
      if (storedOpacity) {
        opacitySlider.value = storedOpacity;
      }
      if (storedProjection) {
        projectionSelect.value = storedProjection;
        if (storedProjection === 'globe') {
          map.setProjection({ type: 'globe' });
        } else {
          map.setProjection({ type: 'mercator' });
          map.setPitch(0);
          map.dragRotate.disable();
        }
      }
    }

    // Global helper for interactive tooltip
    window.setLayer = (type, month) => {
      if (type) currentLayerType = type;
      if (month !== undefined) currentMonth = String(month);
      updateLayers();
      maybeRefresh();
    };

    // Scroll-to-change selection helper
    function makeSelectScrollable(selectEl) {
      selectEl.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 1 : -1;
        let newIndex = selectEl.selectedIndex + delta;
        if (newIndex >= 0 && newIndex < selectEl.options.length) {
          selectEl.selectedIndex = newIndex;
          selectEl.dispatchEvent(new Event('change'));
        }
      }, { passive: false });
    }

    makeSelectScrollable(eraSelect);
    makeSelectScrollable(compareSelect);
    makeSelectScrollable(basemapSelect);
    makeSelectScrollable(unitsSelect);
    makeSelectScrollable(projectionSelect);

    // FETCH STATIC JSON DATABASE (Now Tiled/On-Demand)

    document.getElementById('status').innerText = "Click map to load high-res climate data";

    // Helper for Rainbow Color Coding via HSL
    function getTempColor(t) {
      let clamped = Math.max(-30, Math.min(30, t));
      let hue = 240 * (1 - (clamped + 30) / 60);
      return `hsl(${hue}, 100%, 65%)`;
    }

    function getPrecipColor(p) {
      // Map 0-500mm to HSL 0-300 (Red to Magenta) to match map legend
      let clamped = Math.max(0, Math.min(500, p));
      let curve = Math.pow(clamped / 500, 0.7);
      let hue = 300 * curve;
      return `hsl(${hue}, 100%, 65%)`;
    }

    let lastQueryData = null;
    let lastLatLng = null;
    let lockedTooltipCoords = "";

    function updatePopup() {
      if (!lastQueryData || !lastLatLng) return;
      const { d1, d2, isCompare, era, compareEra } = lastQueryData;
      const latlng = lastLatLng;

      const info1 = LEGENDS[d1.i] || ["Unk", "Unknown"];
      const info2 = isCompare ? (LEGENDS[d2.i] || ["Unk", "Unknown"]) : null;

      const unitType = document.getElementById('units').value;
      const isMetric = unitType === 'metric';

      const totalP1 = d1.p.reduce((acc, curr) => acc + curr, 0);
      const avgT1 = d1.t.reduce((acc, curr) => acc + curr, 0) / d1.t.length;

      const totalP2 = isCompare ? d2.p.reduce((acc, curr) => acc + curr, 0) : null;
      const avgT2 = isCompare ? d2.t.reduce((acc, curr) => acc + curr, 0) / d2.t.length : null;

      let html = `<div style="min-width: 280px; font-family: inherit; color: #eee; padding-top: 5px;">`;

      // 1. KOPPEN HEADER
      const coordHtml = lockedTooltipCoords;

      if (isCompare) {
        html += `
          <div style="font-weight:700; border-bottom:1px solid #444; padding-bottom:8px; margin-bottom:8px; display: flex; align-items: flex-start; cursor: pointer;" onclick="setLayer('koppen')">
            <div style="display: flex; align-items: center;">
              <span style="background:${COLORS[d1.i]}; color:#000; padding:2px 6px; border-radius:3px;">${info1[0]}</span>
              <span style="margin: 0 10px; color: #888;">&rarr;</span>
              <span style="background:${COLORS[d2.i]}; color:#000; padding:2px 6px; border-radius:3px;">${info2[0]}</span>
            </div>
            ${coordHtml}
          </div>`;
      } else {
        html += `
          <div style="font-weight:700; border-bottom:1px solid #444; padding-bottom:5px; margin-bottom:8px; display: flex; align-items: flex-start; cursor: pointer;" onclick="setLayer('koppen')">
            <div style="display: flex; align-items: center; gap: 8px;">
               <span style="background:${COLORS[d1.i]}; color:#000; padding:2px 6px; border-radius:3px;">${info1[0]}</span>
               ${info1[1]}
            </div>
            ${coordHtml}
          </div>`;
      }

      // 2. DATA BODY
      if (isCompare) {
        // COMPARE MODE: Delta view
        const dT = avgT2 - avgT1;
        const dP = ((totalP2 - totalP1) / Math.max(totalP1, 1)) * 100;
        const tColor = dT > 0 ? "#ff4d4d" : "#4d94ff";   // red=warm, blue=cool
        const pColor = dP > 0 ? "#4d94ff" : "#ff4d4d";   // blue=wetter, red=drier

        html += `
          <div style="display: flex; justify-content: space-around; padding: 10px 0; text-align: center;">
            <div style="cursor: pointer;" onclick="setLayer('temp', 12)">
              <div style="font-size: 10px; color: #aaa; margin-bottom: 4px;">TEMP CHANGE</div>
              <div style="font-size: 18px; font-weight: bold; color: ${tColor};">
                ${dT > 0 ? '+' : ''}${isMetric ? dT.toFixed(1) : (dT * 1.8).toFixed(1)}°
              </div>
            </div>
            <div style="cursor: pointer;" onclick="setLayer('precip', 12)">
              <div style="font-size: 10px; color: #aaa; margin-bottom: 4px;">PRECIP CHANGE</div>
              <div style="font-size: 18px; font-weight: bold; color: ${pColor};">
                ${dP > 0 ? '+' : ''}${dP.toFixed(1)}%
              </div>
            </div>
          </div>
        `;
      } else {
        // Full Monthly Chart for all single-era views (historical and modern)
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const isModern = era === '1991_2020';

        // Find min/max indices for modern precip
        const maxP = Math.max(...d1.p);
        const minP = Math.min(...d1.p);
        const maxIdx = d1.p.indexOf(maxP);
        const minIdx = d1.p.indexOf(minP);

        html += `
          <table style="width:100%; font-size:11px; border-collapse:collapse; text-align:center;">
            <tr style="color:#aaa; border-bottom:1px solid #333;">
              <td style="text-align:left; font-weight:bold; padding:2px 0;"></td>
              ${months.map((m, i) => {
          let style = "";
          let click = isModern ? `setLayer('temp', ${i})` : ""; 
          let cursor = isModern ? "cursor:pointer" : "cursor:default";
          
          if (i === maxIdx) { style = "color:#8da0cf; text-decoration:underline;"; click = `setLayer('precip_max')`; cursor = "cursor:pointer"; }
          else if (i === minIdx) { style = "color:#f1948a; text-decoration:underline;"; click = `setLayer('precip_min')`; cursor = "cursor:pointer"; }
          
          return `<td style="padding: 0 2px; ${cursor}; ${style}" onclick="${click}">${m}</td>`;
        }).join('')}
              <td style="border-left: 1px solid #444; font-weight: bold; padding-left: 4px;">Year</td>
            </tr>
            <tr style="cursor: pointer;" onclick="setLayer('temp', 12)">
              <td style="text-align:left; color:#aaa; font-weight:bold; padding:2px 0;">T°</td>
              ${d1.t.map((t, i) => {
          const decoration = isModern ? "text-decoration: underline; cursor: pointer;" : "cursor: default;";
          const click = isModern ? `event.stopPropagation(); setLayer('temp', ${i})` : "event.stopPropagation();";
          return `<td style="color:${getTempColor(t)}; font-weight:bold; ${decoration}" onclick="${click}">${isMetric ? Math.round(t) : Math.round(t * 1.8 + 32)}</td>`;
        }).join('')}
              <td style="border-left: 1px solid #444; font-weight: bold; text-decoration: underline; cursor: pointer; color:${getTempColor(avgT1)};" onclick="event.stopPropagation(); setLayer('temp', 12)">${isMetric ? Math.round(avgT1) : Math.round(avgT1 * 1.8 + 32)}</td>
            </tr>
            <tr style="cursor: pointer;" onclick="setLayer('precip', 12)">
              <td style="text-align:left; color:#aaa; font-weight:bold; padding:2px 0;">P</td>
              ${d1.p.map((p, i) => {
          const decoration = isModern ? "text-decoration: underline; cursor: pointer;" : "cursor: default;";
          const click = isModern ? `event.stopPropagation(); setLayer('precip', ${i})` : "event.stopPropagation();";
          return `<td style="color:${getPrecipColor(p)}; font-weight:bold; ${decoration}" onclick="${click}">${isMetric ? Math.round(p) : (p / 25.4).toFixed(1)}</td>`;
        }).join('')}
              <td style="border-left: 1px solid #444; font-weight: bold; text-decoration: underline; cursor: pointer; color:${getPrecipColor(totalP1 / 12)};" onclick="event.stopPropagation(); setLayer('precip', 12)">${isMetric ? Math.round(totalP1) : (totalP1 / 25.4).toFixed(1)}</td>
            </tr>
          </table>
        `;
      }

      html += `</div>`;

      if (window.currentPopup && window.currentPopup.isOpen()) {
        window.currentPopup.setHTML(html);
        // Note: we don't need to update LngLat if it hasn't moved.
      } else {
        window.currentPopup = new maplibregl.Popup({
          maxWidth: '450px',
          className: 'climate-popup',
          anchor: 'bottom'
        })
          .setLngLat([latlng.lng, latlng.lat])
          .setHTML(html)
          .addTo(map);
      }
    }

    const queryCache = {};
    let queryAbortController = null;

    async function fetchJson(url, signal) {
      if (queryCache[url]) return queryCache[url];
      try {
        const res = await fetch(url, { signal });
        if (!res.ok) return null;
        queryCache[url] = await res.json();
        return queryCache[url];
      } catch(e) { return null; }
    }

    function decodeRle(rle, px, py) {
      if (!rle || !rle[py]) return 0;
      const row = rle[py];
      let cur = 0;
      for (let i = 0; i < row.length; i++) {
        let count = row[i][0];
        if (px < cur + count) return row[i][1];
        cur += count;
      }
      return 0;
    }

    // OFFLINE CLICK QUERY
    async function queryLocation(lat, lng, isRefresh = false) {
      if (!lat) return;

      const wrappedLng = ((lng + 180) % 360 + 360) % 360 - 180;
      const clampedLat = Math.max(-89.9, Math.min(89.9, lat));

      if (queryAbortController) queryAbortController.abort();
      queryAbortController = new AbortController();
      const signal = queryAbortController.signal;

      // Clear previous data IMMEDIATELY to prevent ghosting during refresh
      lastQueryData = null;

      const eras = ["1901_1930", "1931_1960", "1961_1990", "1991_2020"];
      let era1 = eraSelect.value;
      let era2 = compareSelect.value;

      if (era2 !== 'none' && eras.indexOf(era1) > eras.indexOf(era2)) {
        [era1, era2] = [era2, era1];
      }

      const isComp = era2 !== 'none' && era1 !== era2;

      // Z=7 Web Mercator tile mathematics
      const map_size = 256 * Math.pow(2, 7);
      let x_norm = (wrappedLng + 180) / 360;
      let y_norm = 0.5 - (Math.log(Math.tan(Math.PI / 4 + (clampedLat * Math.PI / 180) / 2)) / (2 * Math.PI));
      
      let px = Math.floor(x_norm * map_size);
      let py = Math.floor(y_norm * map_size);
      
      if (py < 0 || py >= map_size) return;
      
      let tileX = Math.floor(px / 256);
      let tileY = Math.floor(py / 256);
      let pixelX = px % 256;
      let pixelY = py % 256;

      // 0.1 degree Grid and 10x10 Chunking
      const latC = Math.floor(clampedLat / 10) * 10;
      const lonC = Math.floor(wrappedLng / 10) * 10;
      const gridY = Math.floor((90 - clampedLat) / 180 * 1800);
      const gridX = Math.floor((wrappedLng + 180) / 360 * 3600) % 3600;

      try {
        document.getElementById('status').innerText = `Loading...`;

        const [rle1, rle2, grid1, grid2] = await Promise.all([
          fetchJson(`${era1}/koppen_rle/7/${tileX}/${tileY}.json`, signal),
          isComp ? fetchJson(`${era2}/koppen_rle/7/${tileX}/${tileY}.json`, signal) : Promise.resolve(null),
          fetchJson(`${era1}/climate_grid/${latC}_${lonC}.json`, signal),
          isComp ? fetchJson(`${era2}/climate_grid/${latC}_${lonC}.json`, signal) : Promise.resolve(null)
        ]);

        if (signal.aborted) return;
        
        const kid1 = decodeRle(rle1, pixelX, pixelY);
        const kid2 = isComp ? decodeRle(rle2, pixelX, pixelY) : 0;
        const d1_raw = grid1 ? grid1[`${gridY}_${gridX}`] : null;
        const d2_raw = (isComp && grid2) ? grid2[`${gridY}_${gridX}`] : null;

        if (!kid1 || !d1_raw) {
          document.getElementById('status').innerText = "Ocean (No Data)";
          if (window.currentPopup) window.currentPopup.remove();
          return;
        }

        // Freeze the era/compare names used during BEFORE THIS query
        lastQueryData = {
          d1: { i: kid1, t: d1_raw.t, p: d1_raw.p },
          d2: (isComp && d2_raw) ? { i: kid2 || kid1, t: d2_raw.t, p: d2_raw.p } : null,
          isCompare: isComp && d2_raw,
          era: eraSelect.value,
          compareEra: compareSelect.value
        };
        document.getElementById('status').innerText = isComp ? "Comparison Data Ready" : "Data Ready";
        updatePopup();
      } catch (err) {
        if (err.name !== 'AbortError') {
          document.getElementById('status').innerText = "Ocean (No Data)";
          if (window.currentPopup) window.currentPopup.remove();
        }
      }
    }

    map.on('click', (e) => {
      // THE ONLY PLACE lockedTooltipCoords and lastLatLng are generated
      const lng = e.lngLat.lng;
      const lat = e.lngLat.lat;
      const wrappedLng = ((lng + 180) % 360 + 360) % 360 - 180;
      const clampedLat = Math.max(-90, Math.min(90, lat));

      const latAbs = Math.abs(clampedLat).toFixed(2);
      const lngAbs = Math.abs(wrappedLng).toFixed(2);
      const latDir = clampedLat >= 0 ? 'N' : 'S';
      const lngDir = wrappedLng >= 0 ? 'E' : 'W';

      lockedTooltipCoords = `
        <div style="text-align: right; font-size: 10px; color: #888; margin-left: auto; line-height: 1.2;">
          <div>${latAbs}° ${latDir}</div>
          <div>${lngAbs}° ${lngDir}</div>
        </div>
      `;
      // CRITICAL: only update the storage on click!
      lastLatLng = { lat: clampedLat, lng: wrappedLng };
      queryLocation(lat, lng);
    });

    // Popup open/close tracking
    map.on('popupopen', () => { isPopupOpen = true; });
    map.on('popupclose', () => { isPopupOpen = false; });

    // Double right-click to reset tilt/pitch
    let lastRightClickTime = 0;
    map.on('contextmenu', (e) => {
      const now = Date.now();
      if (now - lastRightClickTime < 500) {
        e.originalEvent.preventDefault();
        map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
      }
      lastRightClickTime = now;
    });

    // Keyboard ESC to close popups
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && window.currentPopup) {
        window.currentPopup.remove();
      }
    });

    // Middle-button drag to zoom (Google Earth style)
    let isMiddleDragging = false;
    let startY = 0;
    let startZoom = 0;

    map.getCanvas().addEventListener('mousedown', (e) => {
      if (e.button === 1) { // Middle button
        isMiddleDragging = true;
        startY = e.clientY;
        startZoom = map.getZoom();
        map.dragRotate.disable(); // Prevent rotation during zoom drag
        e.preventDefault();
      }
    });

    window.addEventListener('mousemove', (e) => {
      if (isMiddleDragging) {
        const deltaY = startY - e.clientY;
        const zoomDelta = deltaY / 100; // Adjust sensitivity here
        map.setZoom(startZoom + zoomDelta);
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (e.button === 1 && isMiddleDragging) {
        isMiddleDragging = false;
        // Re-enable rotation only if in globe mode
        if (projectionSelect.value === 'globe') {
          map.dragRotate.enable();
        }
      }
    });
  </script>
</body>
